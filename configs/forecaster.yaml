forecaster:
  dataset: 
    name: artemkabseu/financial-transactions-dataset-expenses-and-income

  model:
    path: artifacts/forecaster/forecaster.pkl

  sarima:
    seasonal: true

    freq: D
    seasonal_period: 7

    stepwise: true
    trace: true

    error_action: ignore
    suppress_warnings: true

    information_criterion: aic

    max_p: 3
    max_q: 3
    max_d: 1

    max_P: 2
    max_Q: 2
    max_D: 1

    n_jobs: 1

    max_order: null