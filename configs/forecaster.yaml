forecaster:
  dataset: 
    name: mitulshah/transaction-categorization

  model:
    path: ml/artifacts/forecaster.pkl

  sarima:
    seasonal: true

    freq: W
    seasonal_period: 4

    stepwise: false
    trace: true

    error_action: ignore
    suppress_warnings: true

    information_criterion: aic

    max_p: 7
    max_q: 7
    max_d: 2

    max_P: 5
    max_Q: 5
    max_D: 1

    n_jobs: -1

    max_order: null