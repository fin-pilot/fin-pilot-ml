[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "pfms-backend"
version = "1.0.0"
description = "Backend API for the Personal Finance Management System with ML capabilities"
readme = "README.md"
requires-python = ">=3.9"
authors = [
    { name = "Oleksii Palamarchuk", email = "oleksiypalamarchuck@gmail.com" },
]
dependencies = [
    "python-multipart",
    "fastapi",
    "fastapi-utils",
    "uvicorn[standard]",
    "sqlalchemy",
    "sqlalchemy_utils",
    "alembic",
    "psycopg2-binary",
    "python-jose[cryptography]",
    "pwdlib[argon2,bcrypt]",
    "pydantic[email]",
    "pydantic-settings",
    "pandas",
    "scikit-learn",
    "statsmodels",
    "pyarrow",
    "joblib",
    "datasets",
    "pyyaml",
    "python-dotenv",
    "pmdarima",
    "kagglehub",
    "typing-inspect",
]

[project.optional-dependencies]
dev = ["black", "pylint"]

[tool.black]
line-length = 80
skip-string-normalization = false
